<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Register | EventFlow</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <nav class="glass-nav">
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-calendar-alt"></i> 
                <span>EventFlow</span>
            </div>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="events.html">Events</a></li>
                <li><a href="register.html" class="active">Register</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
            </ul>
            <div class="nav-actions">
                <button id="darkModeToggle" class="dark-toggle" aria-label="Dark mode">
                    <i class="fas fa-moon"></i>
                </button>
                <div class="menu-icon" id="menuIcon">
                    <i class="fas fa-bars"></i>
                </div>
            </div>
        </div>
    </nav>

    <main class="page-container">
        <div class="form-container">
            <div class="section-header">
                <h2><i class="fas fa-user-plus"></i> Event Registration</h2>
                <p>Secure your spot at our upcoming events</p>
            </div>
            
            <form id="registrationForm" class="registration-form glass-card">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                    <div id="nameError" class="error-message" style="display: none;"></div>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                    <div id="emailError" class="error-message" style="display: none;"></div>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-phone"></i> Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="10-digit mobile number" required>
                    <div id="phoneError" class="error-message" style="display: none;"></div>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-calendar-check"></i> Select Event</label>
                    <select id="eventSelect" name="event" required>
                        <option value="">Choose an event</option>
                    </select>
                    <div id="eventError" class="error-message" style="display: none;"></div>
                </div>
                
                <button type="submit" class="btn-primary">
                    <i class="fas fa-paper-plane"></i> Register Now
                </button>
            </form>
        </div>
    </main>

    <footer class="glass-footer">
        <p>© 2025 EventFlow — Powered by passion & innovation | St. Xavier's College</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
